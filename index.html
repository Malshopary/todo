<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مفكرتي الذكية | Smart Cloud Diary</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-grad: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --accent-color: #764ba2;
        }
        body { background-color: #f4f7fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #333; }
        
        /* تصميم الكارت الرئيسي */
        .main-card { 
            border: none; border-radius: 25px; 
            background: #ffffff; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            overflow: hidden;
        }
        .card-header-grad {
            background: var(--primary-grad); color: white; padding: 20px; text-align: center;
        }

        /* نظام البحث */
        .search-box {
            position: relative; margin-bottom: 25px;
        }
        .search-box input {
            border-radius: 50px; padding-right: 45px; border: 2px solid #eee;
            transition: all 0.3s ease; height: 50px;
        }
        .search-box input:focus {
            border-color: var(--accent-color); box-shadow: 0 0 15px rgba(118, 75, 162, 0.1);
        }
        .search-icon {
            position: absolute; right: 20px; top: 15px; color: #aaa;
        }

        /* تنسيق السجلات */
        .section-title {
            font-size: 1rem; font-weight: 800; margin: 30px 0 15px;
            display: flex; align-items: center; text-transform: uppercase; letter-spacing: 1px;
        }
        .section-title i { margin-left: 10px; }
        
        .record-card {
            border: none; border-radius: 18px; background: white;
            margin-bottom: 15px; transition: all 0.3s ease;
            border-right: 6px solid #ddd; box-shadow: 0 5px 15px rgba(0,0,0,0.02);
        }
        .record-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.08); }
        
        .status-today { border-right-color: #007bff; }
        .status-future { border-right-color: #6f42c1; }
        .status-past { border-right-color: #dc3545; }
        .status-completed { border-right-color: #198754; background: #fafffa; opacity: 0.9; }

        .btn-action {
            width: 35px; height: 35px; border-radius: 10px; display: flex;
            align-items: center; justify-content: center; transition: 0.2s;
            border: none; background: #f8f9fa;
        }
        .btn-action:hover { background: #eee; transform: scale(1.1); }

        .nav-pills .nav-link {
            border-radius: 50px; padding: 8px 25px; font-weight: 600; color: #666;
        }
        .nav-pills .nav-link.active { background: var(--primary-grad); box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3); }
        
        .edit-badge {
            font-size: 0.7rem; color: #f39c12; background: #fef5e7;
            padding: 3px 10px; border-radius: 50px; display: inline-block;
        }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-10 col-lg-8">
            
            <div class="card main-card mb-5">
                <div class="card-header-grad">
                    <h4 class="mb-0 fw-bold" id="formTitle"><i class="fa-solid fa-feather-pointed me-2"></i>سجل أفكارك ومهامك</h4>
                </div>
                <div class="card-body p-4">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label fw-bold small text-muted">التاريخ</label>
                            <input type="date" id="dateInput" class="form-control border-0 bg-light rounded-3">
                        </div>
                        <div class="col-md-8">
                            <label class="form-label fw-bold small text-muted">الملاحظة</label>
                            <input type="text" id="dataInput" class="form-control border-0 bg-light rounded-3" placeholder="ماذا يدور في ذهنك؟">
                        </div>
                        <div class="col-12 mt-4 text-center">
                            <button id="saveBtn" onclick="handleSave()" class="btn btn-primary px-5 py-2 rounded-pill fw-bold shadow-lg border-0" style="background: var(--primary-grad);">
                                <i class="fa-solid fa-paper-plane me-2"></i> حفظ في السحابة
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="search-box">
                <i class="fa-solid fa-magnifying-glass search-icon"></i>
                <input type="text" id="searchInput" class="form-control shadow-sm" placeholder="ابحث في سجلاتك..." onkeyup="renderData()">
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">
                <ul class="nav nav-pills bg-white shadow-sm p-1 rounded-pill" id="pills-tab">
                    <li class="nav-item">
                        <button class="nav-link active" onclick="setTab('pending')">المحفوظة</button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link" onclick="setTab('completed')">المكتملة</button>
                    </li>
                </ul>
                <div class="badge bg-white text-dark shadow-sm p-2 rounded-pill px-3 fw-bold" id="currentDateDisplay"></div>
            </div>

            <div id="timelineContainer">
                <div id="section-past-div" style="display:none;">
                    <div class="section-title text-danger"><i class="fa-solid fa-hourglass-end"></i> سجلات سابقة</div>
                    <div id="list-past"></div>
                </div>

                <div id="section-today-div" style="display:none;">
                    <div class="section-title text-primary"><i class="fa-solid fa-calendar-day"></i> قائمة اليوم</div>
                    <div id="list-today"></div>
                </div>

                <div id="section-future-div" style="display:none;">
                    <div class="section-title text-purple" style="color:#764ba2;"><i class="fa-solid fa-forward-step"></i> مهام لاحقاً</div>
                    <div id="list-future"></div>
                </div>
            </div>

            <div id="list-completed" style="display:none;"></div>

        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, query, orderBy, onSnapshot } 
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT.appspot.com",
        messagingSenderId: "YOUR_ID",
        appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const recordsCol = collection(db, "smart_records");

    let currentTab = 'pending';
    let allRecords = [];
    let editingId = null;

    const todayStr = new Date().toISOString().split('T')[0];
    document.getElementById('currentDateDisplay').innerText = todayStr;
    document.getElementById('dateInput').value = todayStr;

    onSnapshot(query(recordsCol, orderBy("timestamp", "desc")), (snapshot) => {
        allRecords = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderData();
    });

    window.handleSave = async () => {
        const dateVal = document.getElementById('dateInput').value;
        const content = document.getElementById('dataInput').value;

        if(!dateVal || !content) return;
        if(dateVal < todayStr && !editingId) {
            alert("لا يمكنك التسجيل في الماضي!");
            return;
        }

        const btn = document.getElementById('saveBtn');

        if (editingId) {
            const lastEditTime = new Date().toLocaleString('ar-EG', { hour: '2-digit', minute: '2-digit', day: '2-digit', month: '2-digit' });
            await updateDoc(doc(db, "smart_records", editingId), {
                date: dateVal, content: content, lastEdit: lastEditTime
            });
            editingId = null;
            btn.innerHTML = '<i class="fa-solid fa-paper-plane me-2"></i> حفظ في السحابة';
            btn.className = "btn btn-primary px-5 py-2 rounded-pill fw-bold shadow-lg border-0";
            document.getElementById('formTitle').innerText = "سجل أفكارك ومهامك";
        } else {
            await addDoc(recordsCol, {
                date: dateVal, content: content, isCompleted: false, timestamp: Date.now(), lastEdit: null
            });
        }

        document.getElementById('dataInput').value = "";
    };

    window.renderData = () => {
        const search = document.getElementById('searchInput').value.toLowerCase();
        const lists = {
            past: document.getElementById('list-past'),
            today: document.getElementById('list-today'),
            future: document.getElementById('list-future'),
            completed: document.getElementById('list-completed')
        };
        const timeline = document.getElementById('timelineContainer');

        Object.values(lists).forEach(l => l.innerHTML = "");

        const filtered = allRecords.filter(r => r.content.toLowerCase().includes(search));

        if (currentTab === 'completed') {
            timeline.style.display = 'none';
            lists.completed.style.display = 'block';
            filtered.filter(r => r.isCompleted).forEach(r => lists.completed.appendChild(createCard(r, 'status-completed')));
        } else {
            timeline.style.display = 'block';
            lists.completed.style.display = 'none';
            filtered.filter(r => !r.isCompleted).forEach(r => {
                if (r.date === todayStr) lists.today.appendChild(createCard(r, 'status-today'));
                else if (r.date > todayStr) lists.future.appendChild(createCard(r, 'status-future'));
                else lists.past.appendChild(createCard(r, 'status-past'));
            });

            document.getElementById('section-past-div').style.display = lists.past.children.length ? 'block' : 'none';
            document.getElementById('section-today-div').style.display = lists.today.children.length ? 'block' : 'none';
            document.getElementById('section-future-div').style.display = lists.future.children.length ? 'block' : 'none';
        }
    };

    function createCard(r, statusClass) {
        const div = document.createElement('div');
        div.className = `card record-card p-3 shadow-sm ${statusClass}`;
        div.innerHTML = `
            <div class="d-flex justify-content-between align-items-center mb-2">
                <span class="badge rounded-pill bg-light text-muted border px-3">📅 ${r.date}</span>
                <div class="d-flex gap-2">
                    <button class="btn-action text-success shadow-sm" onclick="toggleComplete('${r.id}', ${!r.isCompleted})">
                        <i class="fa-solid ${r.isCompleted ? 'fa-rotate-left' : 'fa-check'}"></i>
                    </button>
                    <button class="btn-action text-warning shadow-sm" onclick="prepareEdit('${r.id}')">
                        <i class="fa-solid fa-pen-nib"></i>
                    </button>
                    <button class="btn-action text-danger shadow-sm" onclick="deleteRecord('${r.id}')">
                        <i class="fa-solid fa-trash-can"></i>
                    </button>
                </div>
            </div>
            <p class="mb-1 fw-bold text-dark fs-6">${r.content}</p>
            ${r.lastEdit ? `<div class="mt-2"><span class="edit-badge"><i class="fa-solid fa-history me-1"></i> عُدل في: ${r.lastEdit}</span></div>` : ''}
        `;
        return div;
    }

    window.prepareEdit = (id) => {
        const r = allRecords.find(item => item.id === id);
        document.getElementById('dateInput').value = r.date;
        document.getElementById('dataInput').value = r.content;
        editingId = id;

        const btn = document.getElementById('saveBtn');
        btn.innerHTML = '<i class="fa-solid fa-arrows-rotate me-2"></i> تحديث السجل الحالي';
        btn.style.background = "#f39c12"; 
        document.getElementById('formTitle').innerText = "تعديل السجل الحالي";
        window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    window.toggleComplete = async (id, status) => {
        await updateDoc(doc(db, "smart_records", id), { isCompleted: status });
    };

    window.deleteRecord = async (id) => {
        if(confirm("هل أنت متأكد من حذف هذا السجل؟")) await deleteDoc(doc(db, "smart_records", id));
    };

    window.setTab = (tab) => {
        currentTab = tab;
        renderData();
        const btns = document.querySelectorAll('#pills-tab .nav-link');
        btns[0].classList.toggle('active', tab === 'pending');
        btns[1].classList.toggle('active', tab === 'completed');
    };
</script>
</body>
</html>

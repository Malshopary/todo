<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المفكرة الزمنية الذكية 🚀</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { background-color: #f0f4f8; font-family: 'Segoe UI', sans-serif; }
        .main-card { border-radius: 20px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.08); background: #fff; }
        .section-title { font-size: 1.1rem; font-weight: bold; margin-top: 25px; padding-bottom: 10px; border-bottom: 2px solid #dee2e6; color: #2d3748; }
        .record-card { border-radius: 12px; border: none; border-right: 5px solid #0d6efd; transition: 0.3s; margin-bottom: 12px; box-shadow: 0 3px 6px rgba(0,0,0,0.05); }
        .section-today { border-right-color: #007bff; }
        .section-future { border-right-color: #6f42c1; }
        .section-past { border-right-color: #e53e3e; }
        .completed-card { border-right-color: #198754; opacity: 0.75; background-color: #f8fff9; }
        .badge-time { font-size: 0.75rem; padding: 4px 8px; border-radius: 6px; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-9 col-lg-8">
            
            <div class="card main-card p-4 mb-4">
                <h4 class="text-center fw-bold mb-4 text-primary"><i class="fa-solid fa-calendar-check me-2"></i>إضافة ملاحظة ذكية</h4>
                <div class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label small fw-bold">اختر التاريخ</label>
                        <input type="date" id="dateInput" class="form-control shadow-sm">
                    </div>
                    <div class="col-md-8">
                        <label class="form-label small fw-bold">الملاحظة</label>
                        <input type="text" id="dataInput" class="form-control shadow-sm" placeholder="ماذا تريد أن تسجل؟">
                    </div>
                    <div class="col-12 mt-3">
                        <button id="saveBtn" onclick="handleSave()" class="btn btn-primary w-100 py-2 fw-bold shadow">
                            <i class="fa-solid fa-plus-circle me-1"></i> حفظ ومزامنة سحابية
                        </button>
                    </div>
                </div>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="nav nav-pills bg-white p-1 rounded shadow-sm">
                    <button class="nav-link active" id="btn-pending" onclick="setTab('pending')">المحفوظة</button>
                    <button class="nav-link" id="btn-completed" onclick="setTab('completed')">المكتملة</button>
                </div>
                <div class="badge bg-dark p-2 rounded-pill shadow-sm" id="currentDateDisplay"></div>
            </div>

            <div id="timelineContainer">
                <div id="section-past-div" style="display:none;">
                    <div class="section-title text-danger"><i class="fa-solid fa-clock-rotate-left me-2"></i>سابقاً (فاتت ولم تكتمل)</div>
                    <div id="list-past" class="mt-3"></div>
                </div>

                <div id="section-today-div" style="display:none;">
                    <div class="section-title text-primary"><i class="fa-solid fa-star me-2"></i>اليوم</div>
                    <div id="list-today" class="mt-3"></div>
                </div>

                <div id="section-future-div" style="display:none;">
                    <div class="section-title text-purple" style="color:#6f42c1;"><i class="fa-solid fa-forward me-2"></i>لاحقاً</div>
                    <div id="list-future" class="mt-3"></div>
                </div>
            </div>

            <div id="list-completed" style="display:none;"></div>

        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc, query, orderBy, onSnapshot } 
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT.firebaseapp.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT.appspot.com",
        messagingSenderId: "YOUR_ID",
        appId: "YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const recordsCol = collection(db, "smart_records");

    let currentTab = 'pending';
    let allRecords = [];

    // عرض تاريخ اليوم في الواجهة
    const todayStr = new Date().toISOString().split('T')[0];
    document.getElementById('currentDateDisplay').innerText = "تاريخ اليوم: " + todayStr;
    document.getElementById('dateInput').value = todayStr;

    onSnapshot(query(recordsCol, orderBy("timestamp", "desc")), (snapshot) => {
        allRecords = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderData();
    });

    window.handleSave = async () => {
        const dateVal = document.getElementById('dateInput').value;
        const content = document.getElementById('dataInput').value;

        if(!dateVal || !content) return alert("يرجى إدخال البيانات");

        // ❌ منع التواريخ القديمة
        if(dateVal < todayStr) {
            alert("لا يمكن إضافة ملاحظة في تاريخ قديم!");
            return;
        }

        await addDoc(recordsCol, {
            date: dateVal,
            content: content,
            isCompleted: false,
            timestamp: Date.now(),
            lastEdit: null
        });

        document.getElementById('dataInput').value = "";
    };

    window.renderData = () => {
        const listPast = document.getElementById('list-past');
        const listToday = document.getElementById('list-today');
        const listFuture = document.getElementById('list-future');
        const listCompleted = document.getElementById('list-completed');
        const timeline = document.getElementById('timelineContainer');

        // تفريغ القوائم
        [listPast, listToday, listFuture, listCompleted].forEach(l => l.innerHTML = "");

        if (currentTab === 'completed') {
            timeline.style.display = 'none';
            listCompleted.style.display = 'block';
            const completedItems = allRecords.filter(r => r.isCompleted);
            completedItems.forEach(r => listCompleted.appendChild(createCard(r)));
        } else {
            timeline.style.display = 'block';
            listCompleted.style.display = 'none';

            const pendingItems = allRecords.filter(r => !r.isCompleted);
            
            pendingItems.forEach(r => {
                if (r.date === todayStr) {
                    listToday.appendChild(createCard(r, 'section-today'));
                } else if (r.date > todayStr) {
                    listFuture.appendChild(createCard(r, 'section-future'));
                } else {
                    listPast.appendChild(createCard(r, 'section-past'));
                }
            });

            // إظهار/إخفاء العناوين حسب وجود بيانات
            document.getElementById('section-past-div').style.display = listPast.children.length ? 'block' : 'none';
            document.getElementById('section-today-div').style.display = listToday.children.length ? 'block' : 'none';
            document.getElementById('section-future-div').style.display = listFuture.children.length ? 'block' : 'none';
        }
    };

    function createCard(r, sectionClass = '') {
        const div = document.createElement('div');
        div.className = `card record-card p-3 shadow-sm ${sectionClass} ${r.isCompleted ? 'completed-card' : ''}`;
        div.innerHTML = `
            <div class="d-flex justify-content-between align-items-start mb-2">
                <span class="badge bg-light text-dark border badge-time">📅 ${r.date}</span>
                <div class="d-flex gap-1">
                    <button class="btn btn-sm btn-outline-success border-0" onclick="toggleComplete('${r.id}', ${!r.isCompleted})">
                        <i class="fa-solid ${r.isCompleted ? 'fa-rotate-left' : 'fa-check-circle'}"></i>
                    </button>
                    <button class="btn btn-sm btn-outline-danger border-0" onclick="deleteRecord('${r.id}')">
                        <i class="fa-solid fa-trash-can"></i>
                    </button>
                </div>
            </div>
            <p class="mb-1 fw-medium text-dark">${r.content}</p>
        `;
        return div;
    }

    window.toggleComplete = async (id, status) => {
        await updateDoc(doc(db, "smart_records", id), { isCompleted: status });
    };

    window.deleteRecord = async (id) => {
        if(confirm("هل تريد الحذف؟")) await deleteDoc(doc(db, "smart_records", id));
    };

    window.setTab = (tab) => {
        currentTab = tab;
        document.getElementById('btn-pending').classList.toggle('active', tab === 'pending');
        document.getElementById('btn-completed').classList.toggle('active', tab === 'completed');
        renderData();
    };

</script>
</body>
</html>

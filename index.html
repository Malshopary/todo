<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مفكرتي السحابية الآمنة | DailyApp Secure</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-grad: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --accent-color: #764ba2;
        }
        body { background-color: #f4f7fa; font-family: 'Segoe UI', Tahoma, sans-serif; color: #333; }
        
        #authSection { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .auth-card { width: 100%; max-width: 400px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); background: white; padding: 30px; border: none; }

        #mainApp { display: none; }
        .main-card { border: none; border-radius: 25px; background: #ffffff; box-shadow: 0 15px 35px rgba(0,0,0,0.05); overflow: hidden; }
        .card-header-grad { background: var(--primary-grad); color: white; padding: 20px; text-align: center; }
        
        .record-card { border: none; border-radius: 18px; background: white; margin-bottom: 15px; border-right: 6px solid #764ba2; box-shadow: 0 5px 15px rgba(0,0,0,0.02); }
        .btn-action { width: 35px; height: 35px; border-radius: 10px; display: flex; align-items: center; justify-content: center; border: none; background: #f8f9fa; transition: 0.2s; }
        .btn-action:hover { transform: scale(1.1); background: #eee; }
    </style>
</head>
<body>

<div id="authSection">
    <div class="auth-card text-center">
        <h3 class="fw-bold mb-4" id="authTitle">تسجيل الدخول</h3>
        <input type="email" id="emailInput" class="form-control mb-3" placeholder="البريد الإلكتروني">
        <input type="password" id="passInput" class="form-control mb-4" placeholder="كلمة المرور">
        <button onclick="handleAuth()" id="authBtn" class="btn btn-primary w-100 rounded-pill py-2 fw-bold mb-3" style="background: var(--primary-grad); border:none;">دخول</button>
        <p class="small text-muted" id="toggleAuthText">ليس لديك حساب؟ <a href="#" onclick="toggleAuthMode()">سجل الآن</a></p>
    </div>
</div>

<div id="mainApp" class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-10 col-lg-8">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <span id="userEmailBadge" class="badge bg-white text-dark p-2 px-3 border rounded-pill shadow-sm"></span>
                <button onclick="handleLogout()" class="btn btn-sm btn-danger rounded-pill px-3 shadow-sm"><i class="fa-solid fa-power-off me-1"></i> خروج</button>
            </div>

            <div class="card main-card mb-4">
                <div class="card-header-grad">
                    <h4 class="mb-0 fw-bold" id="formTitle">سجل أفكارك ومهامك</h4>
                </div>
                <div class="card-body p-4">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <input type="date" id="dateInput" class="form-control border-0 bg-light rounded-3">
                        </div>
                        <div class="col-md-8">
                            <input type="text" id="dataInput" class="form-control border-0 bg-light rounded-3" placeholder="ماذا يدور في ذهنك؟">
                        </div>
                        <div class="col-12 mt-4">
                            <button id="saveBtn" onclick="handleSave()" class="btn btn-primary w-100 py-2 rounded-pill fw-bold shadow border-0" style="background: var(--primary-grad);">حفظ في السحابة</button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="recordsList"></div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, query, where, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCQNTHHl-vNcKzIvprqyHYzJQv2tU0Y0sg",
        authDomain: "dailyapp-3f2ce.firebaseapp.com",
        projectId: "dailyapp-3f2ce",
        storageBucket: "dailyapp-3f2ce.firebasestorage.app",
        messagingSenderId: "139456114278",
        appId: "1:139456114278:web:8620325d20aa72119487a7",
        measurementId: "G-7KGZYE6TEP"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const recordsCol = collection(db, "smart_records");

    let currentUser = null;
    let isLoginMode = true;
    let editingId = null;
    let unsub = null;

    const todayStr = new Date().toISOString().split('T')[0];

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            document.getElementById('authSection').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            document.getElementById('userEmailBadge').innerText = user.email;
            document.getElementById('dateInput').value = todayStr;
            startListening();
        } else {
            currentUser = null;
            document.getElementById('authSection').style.display = 'flex';
            document.getElementById('mainApp').style.display = 'none';
            if (unsub) unsub();
        }
    });

    window.toggleAuthMode = () => {
        isLoginMode = !isLoginMode;
        document.getElementById('authTitle').innerText = isLoginMode ? 'تسجيل الدخول' : 'حساب جديد';
        document.getElementById('authBtn').innerText = isLoginMode ? 'دخول' : 'إنشاء حساب';
        document.getElementById('toggleAuthText').innerHTML = isLoginMode ? 
            'ليس لديك حساب؟ <a href="#" onclick="toggleAuthMode()">سجل الآن</a>' : 
            'لديك حساب بالفعل؟ <a href="#" onclick="toggleAuthMode()">سجل دخول</a>';
    };

    window.handleAuth = async () => {
        const email = document.getElementById('emailInput').value;
        const pass = document.getElementById('passInput').value;
        if(!email || !pass) return alert("يرجى إدخال البيانات");
        try {
            if (isLoginMode) await signInWithEmailAndPassword(auth, email, pass);
            else await createUserWithEmailAndPassword(auth, email, pass);
        } catch (e) { alert("خطأ: " + e.message); }
    };

    window.handleLogout = () => signOut(auth);

    function startListening() {
        // جلب البيانات الخاصة بالمستخدم المسجل حالياً فقط
        const q = query(recordsCol, where("userId", "==", currentUser.uid), orderBy("timestamp", "desc"));
        unsub = onSnapshot(q, (snapshot) => {
            const list = document.getElementById('recordsList');
            list.innerHTML = "";
            snapshot.docs.forEach(d => {
                const data = d.data();
                const div = document.createElement('div');
                div.className = "card record-card p-3 shadow-sm mb-3";
                div.innerHTML = `
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <span class="badge rounded-pill bg-light text-muted border px-3">📅 ${data.date}</span>
                        <div class="d-flex gap-2">
                            <button class="btn-action text-warning shadow-sm" onclick="prepareEdit('${d.id}', '${data.date}', '${data.content}')"><i class="fa-solid fa-pen"></i></button>
                            <button class="btn-action text-danger shadow-sm" onclick="deleteRecord('${d.id}')"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </div>
                    <p class="mb-0 fw-bold text-dark" style="white-space: pre-wrap;">${data.content}</p>
                `;
                list.appendChild(div);
            });
        });
    }

    window.handleSave = async () => {
        const dateVal = document.getElementById('dateInput').value;
        const contentInput = document.getElementById('dataInput');
        const content = contentInput.value.trim();
        const btn = document.getElementById('saveBtn');

        if (!content) return;
        if (dateVal < todayStr && !editingId) return alert("لا يمكن التسجيل في الماضي");

        try {
            if (editingId) {
                await updateDoc(doc(db, "smart_records", editingId), { date: dateVal, content: content });
                editingId = null;
                btn.innerHTML = "حفظ في السحابة";
                btn.style.background = "var(--primary-grad)";
                document.getElementById('formTitle').innerText = "سجل أفكارك ومهامك";
            } else {
                await addDoc(recordsCol, {
                    userId: currentUser.uid,
                    date: dateVal,
                    content: content,
                    timestamp: Date.now()
                });
            }
            contentInput.value = "";
        } catch (e) { alert("خطأ أثناء الحفظ"); }
    };

    window.prepareEdit = (id, date, content) => {
        document.getElementById('dateInput').value = date;
        document.getElementById('dataInput').value = content;
        editingId = id;
        const btn = document.getElementById('saveBtn');
        btn.innerHTML = "تحديث السجل الحالي";
        btn.style.background = "#f39c12";
        document.getElementById('formTitle').innerText = "تعديل الملاحظة";
        window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    window.deleteRecord = async (id) => {
        if (confirm("هل أنت متأكد من الحذف؟")) await deleteDoc(doc(db, "smart_records", id));
    };
</script>
</body>
</html>

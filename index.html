<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مفكرتي الذكية | Smart Cloud Diary</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary-grad: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --accent-color: #764ba2;
        }
        body { background-color: #f4f7fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #333; }
        
        .main-card { 
            border: none; border-radius: 25px; 
            background: #ffffff; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            overflow: hidden;
        }
        .card-header-grad {
            background: var(--primary-grad); color: white; padding: 20px; text-align: center;
        }

        .search-box { position: relative; margin-bottom: 25px; }
        .search-box input { border-radius: 50px; padding-right: 45px; border: 2px solid #eee; transition: all 0.3s ease; height: 50px; }
        .search-box input:focus { border-color: var(--accent-color); box-shadow: 0 0 15px rgba(118, 75, 162, 0.1); }
        .search-icon { position: absolute; right: 20px; top: 15px; color: #aaa; }

        .section-title { font-size: 1rem; font-weight: 800; margin: 30px 0 15px; display: flex; align-items: center; text-transform: uppercase; letter-spacing: 1px; }
        .section-title i { margin-left: 10px; }
        
        .record-card {
            border: none; border-radius: 18px; background: white;
            margin-bottom: 15px; transition: all 0.3s ease;
            border-right: 6px solid #ddd; box-shadow: 0 5px 15px rgba(0,0,0,0.02);
        }
        .record-card:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(0,0,0,0.08); }
        
        .status-today { border-right-color: #007bff; }
        .status-future { border-right-color: #6f42c1; }
        .status-past { border-right-color: #dc3545; }
        .status-completed { border-right-color: #198754; background: #fafffa; opacity: 0.9; }

        .btn-action {
            width: 35px; height: 35px; border-radius: 10px; display: flex;
            align-items: center; justify-content: center; transition: 0.2s;
            border: none; background: #f8f9fa;
        }
        .btn-action:hover { background: #eee; transform: scale(1.1); }

        .nav-pills .nav-link {
            border-radius: 50px; padding: 8px 25px; font-weight: 600; color: #666;
            display: flex; align-items: center; gap: 8px;
        }
        .nav-pills .nav-link.active { background: var(--primary-grad); box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3); }
        
        .count-badge { background: rgba(0,0,0,0.05); color: inherit; padding: 2px 8px; border-radius: 50px; font-size: 0.75rem; }
        .active .count-badge { background: rgba(255,255,255,0.2); color: white; }

        #authSection { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .auth-card { width: 100%; max-width: 400px; padding: 30px; border-radius: 20px; background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        .custom-modal-content { border-radius: 15px; border: none; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .custom-modal-header { background: var(--primary-grad); color: white; border-radius: 15px 15px 0 0; border: none; }

        /* تنسيق الصورة الشخصية والتحميل */
        .profile-wrapper { position: relative; width: 100px; height: 100px; }
        .profile-img-container {
            width: 100px; height: 100px; border-radius: 50%; overflow: hidden;
            border: 3px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            cursor: pointer; background: #eee; display: flex; align-items: center; justify-content: center; transition: 0.3s;
        }
        .profile-img-container:hover { transform: scale(1.05); filter: brightness(0.9); }
        .profile-img-container img { width: 100%; height: 100%; object-fit: cover; }
        .profile-img-container i { font-size: 40px; color: #ccc; }

        .upload-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); border-radius: 50%;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            color: white; font-size: 0.85rem; font-weight: bold; z-index: 5;
        }
    </style>
</head>
<body>

<div id="authSection">
    <div class="auth-card text-center">
        <h3 class="fw-bold mb-4" id="authTitle">تسجيل الدخول</h3>
        <input type="email" id="emailInput" class="form-control mb-3" placeholder="البريد الإلكتروني">
        <input type="password" id="passInput" class="form-control mb-4" placeholder="كلمة المرور">
        <button onclick="handleAuth()" id="authBtn" class="btn btn-primary w-100 rounded-pill py-2 fw-bold mb-3" style="background: var(--primary-grad); border:none;">دخول</button>
        <p class="small text-muted" id="toggleAuthText">ليس لديك حساب؟ <a href="#" onclick="toggleAuthMode()">سجل الآن</a></p>
    </div>
</div>

<div id="mainApp" style="display: none;">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-10 col-lg-8">
                <div class="d-flex align-items-center justify-content-between mb-4 bg-white p-3 rounded-4 shadow-sm">
                    <div class="d-flex align-items-center gap-3">
                        <div class="profile-wrapper">
                            <div class="profile-img-container" onclick="showPhotoOptions()" title="إدارة الصورة">
                                <img id="userAvatar" src="" style="display:none;">
                                <i id="avatarPlaceholder" class="fa-solid fa-circle-user"></i>
                            </div>
                            <div id="uploadOverlay" class="upload-overlay">
                                <span id="uploadPercent">0%</span>
                            </div>
                        </div>
                        <input type="file" id="profileUpload" style="display:none;" accept="image/*">
                        <div>
                            <span id="userEmailBadge" class="fw-bold text-dark d-block"></span>
                            <small class="text-muted">مرحباً بك في مساحتك الخاصة</small>
                        </div>
                    </div>
                    <button onclick="handleLogout()" class="btn btn-sm btn-danger rounded-pill px-3 shadow-sm" title="تسجيل الخروج"><i class="fa-solid fa-power-off"></i> خروج</button>
                </div>

                <div class="card main-card mb-5">
                    <div class="card-header-grad">
                        <h4 class="mb-0 fw-bold"><i class="fa-solid fa-feather-pointed me-2"></i>سجل أفكارك ومهامك</h4>
                    </div>
                    <div class="card-body p-4">
                        <div class="row g-3">
                            <div class="col-md-4">
                                <label class="form-label fw-bold small text-muted">التاريخ</label>
                                <input type="date" id="dateInput" class="form-control border-0 bg-light rounded-3">
                            </div>
                            <div class="col-md-8">
                                <label class="form-label fw-bold small text-muted">الملاحظة</label>
                                <input type="text" id="dataInput" class="form-control border-0 bg-light rounded-3" placeholder="ماذا يدور في ذهنك؟">
                            </div>
                            <div class="col-12 mt-4 text-center d-flex gap-2">
                                <button onclick="handleSave()" class="btn btn-primary flex-grow-1 py-2 rounded-pill fw-bold shadow-lg border-0" style="background: var(--primary-grad);">حفظ في السحابة</button>
                                <button onclick="exportToExcel()" class="btn btn-success px-4 py-2 rounded-pill fw-bold shadow-lg border-0"><i class="fa-solid fa-file-excel"></i></button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="search-box">
                    <i class="fa-solid fa-magnifying-glass search-icon"></i>
                    <input type="text" id="searchInput" class="form-control shadow-sm" placeholder="ابحث في سجلاتك..." onkeyup="renderData()">
                </div>

                <div class="d-flex justify-content-between align-items-center mb-4">
                    <ul class="nav nav-pills bg-white shadow-sm p-1 rounded-pill">
                        <li class="nav-item">
                            <button class="nav-link active" onclick="setTab('pending')">المحفوظة <span class="count-badge" id="pendingCount">0</span></button>
                        </li>
                        <li class="nav-item">
                            <button class="nav-link" onclick="setTab('completed')">المكتملة <span class="count-badge" id="completedCount">0</span></button>
                        </li>
                    </ul>
                    <div class="badge bg-white text-dark shadow-sm p-2 rounded-pill px-3 fw-bold" id="currentDateDisplay"></div>
                </div>

                <div id="timelineContainer">
                    <div id="section-past-div" style="display:none;"><div class="section-title text-danger"><i class="fa-solid fa-hourglass-end"></i> سجلات سابقة</div><div id="list-past"></div></div>
                    <div id="section-today-div" style="display:none;"><div class="section-title text-primary"><i class="fa-solid fa-calendar-day"></i> قائمة اليوم</div><div id="list-today"></div></div>
                    <div id="section-future-div" style="display:none;"><div class="section-title text-purple" style="color:#764ba2;"><i class="fa-solid fa-forward-step"></i> مهام لاحقاً</div><div id="list-future"></div></div>
                </div>
                <div id="list-completed" style="display:none;"></div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="photoModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-sm">
    <div class="modal-content custom-modal-content">
      <div class="modal-header custom-modal-header py-2">
        <h6 class="modal-title fw-bold text-center w-100">إدارة الصورة</h6>
      </div>
      <div class="modal-body text-center p-4">
        <button class="btn btn-outline-primary w-100 mb-2 rounded-pill fw-bold" onclick="triggerUpdatePhoto()">
            <i class="fa-solid fa-camera me-2"></i>تعديل الصورة
        </button>
        <button class="btn btn-outline-danger w-100 rounded-pill fw-bold" onclick="deleteProfilePhoto()">
            <i class="fa-solid fa-trash-can me-2"></i>حذف الصورة
        </button>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="deleteModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content custom-modal-content">
      <div class="modal-header custom-modal-header py-2"><h6 class="modal-title fw-bold">تأكيد الحذف</h6></div>
      <div class="modal-body text-center py-4">
        <i class="fa-solid fa-circle-exclamation text-danger mb-3" style="font-size: 3rem;"></i>
        <p class="fw-bold">هل أنت متأكد من حذف هذا السجل نهائياً؟</p>
      </div>
      <div class="modal-footer border-0 justify-content-center pt-0">
        <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">إلغاء</button>
        <button type="button" class="btn-confirm-delete fw-bold" id="confirmDeleteBtn">نعم، احذف</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, query, where, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, updateProfile } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
    import { getStorage, ref, uploadBytesResumable, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-storage.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCQNTHHl-vNcKzIvprqyHYzJQv2tU0Y0sg",
        authDomain: "dailyapp-3f2ce.firebaseapp.com",
        projectId: "dailyapp-3f2ce",
        storageBucket: "dailyapp-3f2ce.firebasestorage.app",
        messagingSenderId: "139456114278",
        appId: "1:139456114278:web:8620325d20aa72119487a7",
        measurementId: "G-7KGZYE6TEP"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const storage = getStorage(app);
    const recordsCol = collection(db, "smart_records");

    let currentTab = 'pending';
    let allRecords = [];
    let currentUser = null;
    let unsub = null;
    let isLoginMode = true;
    let recordToDelete = null;
    const photoModal = new bootstrap.Modal(document.getElementById('photoModal'));

    const todayStr = new Date().toISOString().split('T')[0];
    document.getElementById('currentDateDisplay').innerText = todayStr;
    document.getElementById('dateInput').value = todayStr;

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            document.getElementById('authSection').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            document.getElementById('userEmailBadge').innerText = user.email;
            updateAvatarUI(user.photoURL);
            startListening();
        } else {
            currentUser = null;
            document.getElementById('authSection').style.display = 'flex';
            document.getElementById('mainApp').style.display = 'none';
            if (unsub) unsub();
        }
    });

    function updateAvatarUI(url) {
        const avatar = document.getElementById('userAvatar');
        const placeholder = document.getElementById('avatarPlaceholder');
        if(url) {
            avatar.src = url;
            avatar.style.display = 'block';
            placeholder.style.display = 'none';
        } else {
            avatar.style.display = 'none';
            placeholder.style.display = 'block';
        }
    }

    // إدارة الصور الشخصية
    window.showPhotoOptions = () => photoModal.show();
    window.triggerUpdatePhoto = () => { photoModal.hide(); document.getElementById('profileUpload').click(); };

    document.getElementById('profileUpload').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if(!file || !currentUser) return;

        const storageRef = ref(storage, `profiles/${currentUser.uid}`);
        const uploadTask = uploadBytesResumable(storageRef, file);
        const overlay = document.getElementById('uploadOverlay');
        const percentText = document.getElementById('uploadPercent');

        overlay.style.display = 'flex';

        uploadTask.on('state_changed', 
            (snapshot) => {
                const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
                percentText.innerText = Math.round(progress) + "%";
            }, 
            (error) => { alert("فشل التحميل"); overlay.style.display = 'none'; }, 
            async () => {
                const downloadURL = await getDownloadURL(uploadTask.snapshot.ref);
                await updateProfile(currentUser, { photoURL: downloadURL });
                updateAvatarUI(downloadURL);
                overlay.style.display = 'none';
            }
        );
    });

    window.deleteProfilePhoto = async () => {
        if(!currentUser.photoURL) return photoModal.hide();
        try {
            const storageRef = ref(storage, `profiles/${currentUser.uid}`);
            await deleteObject(storageRef);
        } catch (e) { console.log("File already deleted or missing"); }
        
        await updateProfile(currentUser, { photoURL: "" });
        updateAvatarUI(null);
        photoModal.hide();
    };

    // (بقية وظائف Firebase الأساسية)
    function startListening() {
        const q = query(recordsCol, where("userId", "==", currentUser.uid), orderBy("timestamp", "desc"));
        unsub = onSnapshot(q, (snapshot) => {
            allRecords = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            updateCounters();
            window.renderData();
        });
    }

    function updateCounters() {
        const pending = allRecords.filter(r => !r.isCompleted).length;
        const completed = allRecords.filter(r => r.isCompleted).length;
        document.getElementById('pendingCount').innerText = pending;
        document.getElementById('completedCount').innerText = completed;
    }

    window.handleAuth = async () => {
        const email = document.getElementById('emailInput').value;
        const pass = document.getElementById('passInput').value;
        if(!email || !pass) return alert("يرجى ملء الحقول");
        try {
            if (isLoginMode) await signInWithEmailAndPassword(auth, email, pass);
            else await createUserWithEmailAndPassword(auth, email, pass);
        } catch (e) { alert("خطأ: " + e.message); }
    };

    window.toggleAuthMode = () => {
        isLoginMode = !isLoginMode;
        document.getElementById('authTitle').innerText = isLoginMode ? 'تسجيل الدخول' : 'حساب جديد';
        document.getElementById('authBtn').innerText = isLoginMode ? 'دخول' : 'إنشاء حساب';
        document.getElementById('toggleAuthText').innerHTML = isLoginMode ? 'ليس لديك حساب؟ <a href="#" onclick="toggleAuthMode()">سجل الآن</a>' : 'لديك حساب بالفعل؟ <a href="#" onclick="toggleAuthMode()">سجل دخول</a>';
    };

    window.handleLogout = () => signOut(auth);
    window.handleSave = async () => {
        const dateVal = document.getElementById('dateInput').value;
        const contentInput = document.getElementById('dataInput');
        const content = contentInput.value.trim();
        if(!dateVal || !content) return;
        try {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
            await addDoc(recordsCol, { userId: currentUser.uid, date: dateVal, time: timeStr, content: content, isCompleted: false, timestamp: Date.now() });
            contentInput.value = "";
        } catch (e) { alert("خطأ في الحفظ"); }
    };

    window.renderData = () => {
        const search = document.getElementById('searchInput').value.toLowerCase();
        const lists = { past: document.getElementById('list-past'), today: document.getElementById('list-today'), future: document.getElementById('list-future'), completed: document.getElementById('list-completed') };
        const timeline = document.getElementById('timelineContainer');
        Object.values(lists).forEach(l => l.innerHTML = "");
        const filtered = allRecords.filter(r => r.content.toLowerCase().includes(search));
        if (currentTab === 'completed') {
            timeline.style.display = 'none'; lists.completed.style.display = 'block';
            filtered.filter(r => r.isCompleted).forEach(r => lists.completed.appendChild(createCard(r, 'status-completed')));
        } else {
            timeline.style.display = 'block'; lists.completed.style.display = 'none';
            filtered.filter(r => !r.isCompleted).forEach(r => {
                if (r.date === todayStr) lists.today.appendChild(createCard(r, 'status-today'));
                else if (r.date > todayStr) lists.future.appendChild(createCard(r, 'status-future'));
                else lists.past.appendChild(createCard(r, 'status-past'));
            });
            document.getElementById('section-past-div').style.display = lists.past.children.length ? 'block' : 'none';
            document.getElementById('section-today-div').style.display = lists.today.children.length ? 'block' : 'none';
            document.getElementById('section-future-div').style.display = lists.future.children.length ? 'block' : 'none';
        }
    };

    function createCard(r, statusClass) {
        const div = document.createElement('div');
        div.className = `card record-card p-3 shadow-sm ${statusClass}`;
        const isComp = r.isCompleted;
        div.innerHTML = `
            <div class="d-flex justify-content-between align-items-center mb-2">
                <span class="badge rounded-pill bg-light text-muted border px-3">📅 ${r.date} 🕒 ${r.time}</span>
                <div class="d-flex gap-2">
                    <button class="btn-action text-success shadow-sm" onclick="toggleComplete('${r.id}', ${!isComp})"><i class="fa-solid ${isComp ? 'fa-rotate-left' : 'fa-check'}"></i></button>
                    ${!isComp ? `<button class="btn-action text-warning shadow-sm" onclick="inlineEdit('${r.id}')"><i class="fa-solid fa-pen-nib"></i></button>` : ''}
                    ${!isComp ? `<button class="btn-action text-danger shadow-sm" onclick="triggerDelete('${r.id}')"><i class="fa-solid fa-trash-can"></i></button>` : ''}
                </div>
            </div>
            <div id="content-container-${r.id}"><p class="mb-1 fw-bold text-dark fs-6 text-break" style="white-space: pre-wrap;">${r.content}</p></div>
        `;
        return div;
    }

    window.toggleComplete = async (id, status) => { await updateDoc(doc(db, "smart_records", id), { isCompleted: status }); };
    window.setTab = (tab) => { currentTab = tab; window.renderData(); };
    window.triggerDelete = (id) => { recordToDelete = id; new bootstrap.Modal(document.getElementById('deleteModal')).show(); };
    document.getElementById('confirmDeleteBtn').onclick = async () => { if(recordToDelete) await deleteDoc(doc(db, "smart_records", recordToDelete)); location.reload(); };
</script>
</body>
</html>

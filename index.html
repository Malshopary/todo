<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مدير السجلات اليومية الاحترافي</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .main-card { border: none; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .nav-pills .nav-link { border-radius: 10px; font-weight: bold; color: #4a5568; }
        .nav-pills .nav-link.active { background-color: #0d6efd; box-shadow: 0 4px 10px rgba(13, 110, 253, 0.3); }
        .record-card { transition: all 0.3s ease; border-right: 5px solid #0d6efd; border-radius: 12px; }
        .record-card.completed { border-right-color: #198754; opacity: 0.85; }
        .meta-text { font-size: 0.8rem; color: #718096; }
        .edit-info { font-size: 0.75rem; color: #dd6b20; background: #fffaf0; padding: 2px 8px; border-radius: 4px; display: inline-block; margin-top: 5px; }
        .search-input { border-radius: 20px; border: 2px solid #e2e8f0; }
        .btn-action { width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; border-radius: 8px; }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-9 col-lg-8">
            
            <div class="card main-card p-4 mb-4 border-0">
                <h4 class="fw-bold mb-4 text-primary text-center"><i class="fa-solid fa-file-pen me-2"></i>تسجيل بيانات جديدة</h4>
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label small fw-bold text-secondary">التاريخ</label>
                        <input type="date" id="dateInput" class="form-control shadow-sm border-0 bg-light">
                    </div>
                    <div class="col-12">
                        <textarea id="dataInput" class="form-control shadow-sm border-0 bg-light" rows="3" placeholder="اكتب ملاحظاتك اليومية هنا..."></textarea>
                    </div>
                    <div class="col-12 d-flex gap-2">
                        <button id="saveBtn" onclick="saveData()" class="btn btn-primary px-4 py-2 fw-bold shadow-sm w-100">
                            <i class="fa-solid fa-plus-circle me-1"></i> حفظ السجل
                        </button>
                        <button onclick="exportToCSV()" class="btn btn-success px-4 py-2 fw-bold shadow-sm">
                            <i class="fa-solid fa-file-export"></i>
                        </button>
                    </div>
                </div>
            </div>

            <div class="d-flex flex-column flex-md-row justify-content-between align-items-center mb-4 gap-3">
                <ul class="nav nav-pills bg-white p-1 rounded-3 shadow-sm" id="pills-tab" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" id="tab-pending" onclick="switchTab('pending')">
                            المحفوظة <span class="badge bg-primary ms-1" id="count-pending">0</span>
                        </button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="tab-completed" onclick="switchTab('completed')">
                            المكتملة <span class="badge bg-success ms-1" id="count-completed">0</span>
                        </button>
                    </li>
                </ul>
                <div class="position-relative w-100" style="max-width: 300px;">
                    <input type="text" id="searchInput" class="form-control search-input bg-white ps-4" placeholder="بحث..." onkeyup="renderData()">
                </div>
            </div>

            <div id="dataContainer">
                </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    let currentTab = 'pending';
    let editingIndex = -1;

    window.onload = function() {
        document.getElementById('dateInput').valueAsDate = new Date();
        renderData();
    };

    function getCurrentTime() {
        return new Date().toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' });
    }

    function getCurrentDateTime() {
        return new Date().toLocaleDateString('ar-EG') + ' ' + getCurrentTime();
    }

    function saveData() {
        const date = document.getElementById('dateInput').value;
        const data = document.getElementById('dataInput').value.trim();

        if(!date || !data) return alert('أكمل الخانات أولاً');

        let allRecords = JSON.parse(localStorage.getItem('mySmartLog')) || [];

        if (editingIndex === -1) {
            allRecords.unshift({
                id: Date.now(),
                date: date,
                time: getCurrentTime(),
                content: data,
                isCompleted: false,
                lastEdit: null // إخفاء التعديل في البداية
            });
        } else {
            allRecords[editingIndex].date = date;
            allRecords[editingIndex].content = data;
            allRecords[editingIndex].lastEdit = getCurrentDateTime();
            
            editingIndex = -1;
            document.getElementById('saveBtn').innerHTML = '<i class="fa-solid fa-plus-circle me-1"></i> حفظ السجل';
            document.getElementById('saveBtn').classList.replace('btn-warning', 'btn-primary');
        }

        localStorage.setItem('mySmartLog', JSON.stringify(allRecords));
        document.getElementById('dataInput').value = '';
        renderData();
    }

    function renderData() {
        const allRecords = JSON.parse(localStorage.getItem('mySmartLog')) || [];
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        const container = document.getElementById('dataContainer');
        
        // تصفية حسب التبويب والبحث
        let filtered = allRecords.filter(r => 
            (currentTab === 'completed' ? r.isCompleted : !r.isCompleted) &&
            (r.content.toLowerCase().includes(searchTerm) || r.date.includes(searchTerm))
        );

        // تحديث العدادات
        document.getElementById('count-pending').innerText = allRecords.filter(r => !r.isCompleted).length;
        document.getElementById('count-completed').innerText = allRecords.filter(r => r.isCompleted).length;

        container.innerHTML = '';

        if(filtered.length === 0) {
            container.innerHTML = '<div class="text-center py-5 text-muted small">لا توجد سجلات حالياً</div>';
            return;
        }

        filtered.forEach((record) => {
            const originalIndex = allRecords.findIndex(r => r.id === record.id);
            const card = document.createElement('div');
            card.className = `card record-card p-3 mb-3 border-0 bg-white shadow-sm ${record.isCompleted ? 'completed' : ''}`;
            
            card.innerHTML = `
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <span class="meta-text fw-bold text-primary"><i class="fa-solid fa-calendar-day me-1"></i> ${record.date} | ${record.time}</span>
                    ${record.lastEdit ? `<span class="edit-info"><i class="fa-solid fa-history me-1"></i> تم التعديل: ${record.lastEdit}</span>` : ''}
                </div>
                <p class="mb-3 text-dark fs-6" style="white-space: pre-line;">${record.content}</p>
                <div class="d-flex justify-content-end gap-2 border-top pt-2">
                    ${!record.isCompleted ? `
                        <button class="btn btn-outline-success btn-action" onclick="toggleStatus(${originalIndex})" title="نقل للمكتملة">
                            <i class="fa-solid fa-check"></i>
                        </button>
                        <button class="btn btn-outline-warning btn-action" onclick="prepareEdit(${originalIndex})" title="تعديل">
                            <i class="fa-solid fa-pen"></i>
                        </button>
                    ` : `
                        <button class="btn btn-outline-secondary btn-action" onclick="toggleStatus(${originalIndex})" title="إعادة للمحفوظة">
                            <i class="fa-solid fa-rotate-left"></i>
                        </button>
                    `}
                    <button class="btn btn-outline-danger btn-action" onclick="deleteRecord(${originalIndex})" title="حذف">
                        <i class="fa-solid fa-trash-can"></i>
                    </button>
                </div>
            `;
            container.appendChild(card);
        });
    }

    function toggleStatus(index) {
        let allRecords = JSON.parse(localStorage.getItem('mySmartLog'));
        allRecords[index].isCompleted = !allRecords[index].isCompleted;
        localStorage.setItem('mySmartLog', JSON.stringify(allRecords));
        renderData();
    }

    function switchTab(tab) {
        currentTab = tab;
        document.getElementById('tab-pending').classList.toggle('active', tab === 'pending');
        document.getElementById('tab-completed').classList.toggle('active', tab === 'completed');
        renderData();
    }

    function prepareEdit(index) {
        let allRecords = JSON.parse(localStorage.getItem('mySmartLog'));
        const r = allRecords[index];
        document.getElementById('dateInput').value = r.date;
        document.getElementById('dataInput').value = r.content;
        editingIndex = index;
        
        const btn = document.getElementById('saveBtn');
        btn.innerHTML = '<i class="fa-solid fa-arrows-rotate me-1"></i> تحديث التعديلات';
        btn.classList.replace('btn-primary', 'btn-warning');
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function deleteRecord(index) {
        if(confirm("حذف السجل نهائياً؟")) {
            let allRecords = JSON.parse(localStorage.getItem('mySmartLog'));
            allRecords.splice(index, 1);
            localStorage.setItem('mySmartLog', JSON.stringify(allRecords));
            renderData();
        }
    }

    function exportToCSV() {
        const allRecords = JSON.parse(localStorage.getItem('mySmartLog')) || [];
        if (allRecords.length === 0) return alert("لا بيانات!");
        
        let csv = "\ufeffالتاريخ,الوقت,المحتوى,الحالة,آخر تعديل\n";
        allRecords.forEach(r => {
            csv += `"${r.date}","${r.time}","${r.content.replace(/"/g, '""')}","${r.isCompleted ? 'مكتمل' : 'محفوظ'}","${r.lastEdit || 'أصلي'}"\n`;
        });

        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "سجلات_يومية.csv";
        link.click();
    }
</script>

</body>
</html>
